# CODA-LM main configuration for LLaVA-1.5-7B.

model:
  name: llava-v1.5-7b
  path: liuhaotian/llava-v1.5-7b
  conv_mode: llava_v1
  freeze_vlm: true

data:
  coda_data_root: /path/to/CODA-data
  root: /path/to/CODA-data/CODA-LM
  train_annotation: Train/vqa_anno/region_perception.jsonl
  test_annotation: Test/vqa_anno/region_perception.jsonl
  image_root: /path/to/CODA-data

class_embeddings:
  num_classes: 29
  dim: 1024
  ema_momentum: 0.95
  class2idx: configs/coda_class2idx.json
  visual_features_dir: outputs/roi_features
  checkpoint: outputs/class_embeddings/class_embeddings_best.pth

adapter:
  visual_dim: 4096
  latent_dim: 1024
  num_heads: 8
  epochs: 10
  batch_size: 4
  lr: 0.0001
  reconstruction_weight: 1.0
  autoregressive_weight: 1.0
  checkpoint: outputs/adapter_llava15/adapter_last.pth

inference:
  use_visual_refinement: true
  use_text_hints: true
  top_k_hints: 3
  detection_dir: saved_sample_objects
